let currentIdx = 0;
let filteredProblems = [...problems];

function buildSidebar(list) {
  const sb = document.getElementById('sidebarList');
  sb.innerHTML = '';
  let lastSection = '';
  list.forEach((p, i) => {
    if(p.section !== lastSection) {
      lastSection = p.section;
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      sec.textContent = p.section;
      sb.appendChild(sec);
    }
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (p === problems[currentIdx] ? ' active' : '');
    item.textContent = p.id + '. ' + p.title;
    item.onclick = () => { currentIdx = problems.indexOf(p); render(); buildSidebar(filteredProblems); };
    sb.appendChild(item);
  });
}

function filterSidebar(q) {
  if(!q.trim()) { filteredProblems = [...problems]; }
  else { filteredProblems = problems.filter(p => p.title.toLowerCase().includes(q.toLowerCase()) || String(p.id).includes(q)); }
  buildSidebar(filteredProblems);
}

function prevDiagram() { if(currentIdx > 0) { currentIdx--; render(); buildSidebar(filteredProblems); } }
function nextDiagram() { if(currentIdx < problems.length-1) { currentIdx++; render(); buildSidebar(filteredProblems); } }

function makeUMLBox(cls) {
  const div = document.createElement('div');
  div.className = 'uml-box';
  const h = document.createElement('div');
  h.className = 'uml-box-header blue';
  h.textContent = cls.name;
  div.appendChild(h);
  if(cls.attrs && cls.attrs.length) {
    const s = document.createElement('div');
    s.className = 'uml-box-section';
    cls.attrs.forEach(a => {
      const d = document.createElement('div');
      d.className = 'private';
      d.textContent = a;
      s.appendChild(d);
    });
    div.appendChild(s);
  }
  const ms = cls.methods || [];
  const defaultMethods = ['+Add'+cls.name+'()`,+Update'+cls.name+'()`,+Display'+cls.name+'()`,+Delete'+cls.name+'()'];
  const finalMethods = ms.length ? ms : [];
  if(finalMethods.length || true) {
    const s2 = document.createElement('div');
    s2.className = 'uml-box-section';
    (finalMethods.length ? finalMethods : ['+add()','+update()','+display()','+delete()']).forEach(m => {
      const d = document.createElement('div');
      d.className = 'public';
      d.textContent = m;
      s2.appendChild(d);
    });
    div.appendChild(s2);
  }
  return div;
}

function makeStickFigure(name) {
  return `<div class="stick-figure">
    <div class="stick-head"></div>
    <div style="display:flex;justify-content:center;align-items:center">
      <div class="stick-arm"></div><div class="stick-body" style="height:22px"></div><div class="stick-arm"></div>
    </div>
    <div class="stick-legs"><div class="stick-leg leg-l"></div><div class="stick-leg leg-r"></div></div>
    <div style="margin-top:2px;font-size:10px">${name}</div>
  </div>`;
}

function makeUseOval(text) {
  return `<div class="use-oval">${text}</div>`;
}

function renderDFDUseCase(p, canvas) {
  canvas.innerHTML = `<div class="diagram-title">Class Diagram — ${p.title}</div>`;
  const area = document.createElement('div');
  area.style.cssText = 'display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start';

  // DFD side
  const dfdDiv = document.createElement('div');
  dfdDiv.style.cssText = 'min-width:300px;flex:1';
  dfdDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333;font-family:Arial">DFD — ${p.title}</div>`;
  const dfdInner = document.createElement('div');
  dfdInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;min-height:200px;font-family:Arial';
  // Actors row
  const ar = document.createElement('div');
  ar.style.cssText = 'display:flex;gap:16px;justify-content:space-between;margin-bottom:12px';
  p.dfd.actors.forEach(a => {
    ar.innerHTML += `<div class="dfd-box" style="font-size:11px;padding:5px 10px">${a}</div>`;
  });
  dfdInner.appendChild(ar);
  // Processes
  const pr = document.createElement('div');
  pr.style.cssText = 'display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px';
  p.dfd.processes.forEach(proc => {
    pr.innerHTML += `<div class="dfd-circle" style="min-width:80px;padding:8px">${proc}</div>`;
  });
  dfdInner.appendChild(pr);
  // Data stores
  const sr = document.createElement('div');
  sr.style.cssText = 'display:flex;gap:16px;justify-content:center;margin-bottom:4px';
  p.dfd.stores.forEach(s => {
    sr.innerHTML += `<div class="dfd-store">${s}</div>`;
  });
  dfdInner.appendChild(sr);
  dfdDiv.appendChild(dfdInner);
  dfdDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px;font-family:Arial">Diagram 1 — Data Flow Diagram (DFD)</div>`;
  area.appendChild(dfdDiv);

  // Use Case side
  const ucDiv = document.createElement('div');
  ucDiv.style.cssText = 'min-width:300px;flex:1';
  ucDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333;font-family:Arial">Use Case Diagram — ${p.title}</div>`;
  const ucInner = document.createElement('div');
  ucInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;min-height:200px;font-family:Arial;display:flex;gap:16px;align-items:flex-start';
  // Actors
  const actDiv = document.createElement('div');
  actDiv.style.cssText = 'display:flex;flex-direction:column;gap:18px;padding-right:8px';
  p.usecase.actors.slice(0,2).forEach(a => {
    actDiv.innerHTML += makeStickFigure(a);
  });
  ucInner.appendChild(actDiv);
  // System boundary
  const sysDiv = document.createElement('div');
  sysDiv.style.cssText = 'border:1.5px solid #999;padding:10px;flex:1;min-height:150px;border-radius:4px';
  sysDiv.innerHTML = `<div style="font-size:10px;text-align:center;margin-bottom:8px;color:#555">${p.title}</div>`;
  const ovals = document.createElement('div');
  ovals.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;justify-content:center';
  p.usecase.cases.forEach(uc => {
    ovals.innerHTML += makeUseOval(uc);
  });
  sysDiv.appendChild(ovals);
  ucInner.appendChild(sysDiv);
  // More actors
  if(p.usecase.actors.length > 2) {
    const actDiv2 = document.createElement('div');
    actDiv2.style.cssText = 'display:flex;flex-direction:column;gap:18px;padding-left:8px';
    p.usecase.actors.slice(2).forEach(a => {
      actDiv2.innerHTML += makeStickFigure(a);
    });
    ucInner.appendChild(actDiv2);
  }
  ucDiv.appendChild(ucInner);
  ucDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px;font-family:Arial">Diagram 2 — Use Case Diagram</div>`;
  area.appendChild(ucDiv);
  canvas.appendChild(area);
}

function renderClassObject(p, canvas) {
  canvas.innerHTML = `<div class="diagram-title">Class Diagram — ${p.title}</div>`;
  const area = document.createElement('div');
  area.style.cssText = 'display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start';

  // Class Diagram
  const cdDiv = document.createElement('div');
  cdDiv.style.cssText = 'min-width:340px;flex:1';
  cdDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333;font-family:Arial">Class Diagram — ${p.title}</div>`;
  const cdInner = document.createElement('div');
  cdInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;font-family:Arial';
  const boxRow = document.createElement('div');
  boxRow.style.cssText = 'display:flex;gap:14px;flex-wrap:wrap;justify-content:center';
  p.classes.forEach(cls => { boxRow.appendChild(makeUMLBox(cls)); });
  cdInner.appendChild(boxRow);
  // Relations
  if(p.relations) {
    const rel = document.createElement('div');
    rel.className = 'rel-section';
    rel.innerHTML = '<div class="section-label">Relationships</div>';
    p.relations.forEach(r => {
      rel.innerHTML += `<div>— ${r.from} <span style="color:#4a90d9">${r.type}</span> ${r.to}${r.mult?' ('+r.mult+')':''}</div>`;
    });
    cdInner.appendChild(rel);
  }
  cdDiv.appendChild(cdInner);
  cdDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px;font-family:Arial">Diagram 1 — Class Diagram</div>`;
  area.appendChild(cdDiv);

  // Object Diagram
  const odDiv = document.createElement('div');
  odDiv.style.cssText = 'min-width:260px;flex:1';
  odDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333;font-family:Arial">Object Diagram — ${p.title}</div>`;
  const odInner = document.createElement('div');
  odInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;font-family:Arial;min-height:120px';
  const objRow = document.createElement('div');
  objRow.style.cssText = 'display:flex;gap:24px;flex-wrap:wrap;align-items:center;justify-content:center';
  if(p.objects) {
    p.objects.forEach(obj => {
      const ob = document.createElement('div');
      ob.className = 'uml-box';
      ob.style.cssText = 'min-width:130px;background:#e8f4f8';
      const hd = document.createElement('div');
      hd.className = 'uml-box-header';
      hd.style.background = '#b8d8ec';
      hd.style.fontStyle = 'italic';
      hd.textContent = obj.name;
      ob.appendChild(hd);
      const sec = document.createElement('div');
      sec.className = 'uml-box-section';
      obj.attrs.forEach(a => {
        const d = document.createElement('div');
        d.style.fontSize = '11px';
        d.textContent = a;
        sec.appendChild(d);
      });
      ob.appendChild(sec);
      objRow.appendChild(ob);
    });
  }
  const arrow = document.createElement('div');
  arrow.style.cssText = 'font-size:22px;color:#4a90d9;display:flex;align-items:center';
  arrow.textContent = '→';
  if(p.objects && p.objects.length >= 2) { objRow.insertBefore(arrow, objRow.children[1]); }
  odInner.appendChild(objRow);
  odDiv.appendChild(odInner);
  odDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px;font-family:Arial">Diagram 2 — Object Diagram</div>`;
  area.appendChild(odDiv);
  canvas.appendChild(area);
}

function renderSequence(p, canvas) {
  canvas.innerHTML = `<div class="diagram-title">Sequence Diagram — ${p.title}</div>`;
  const area = document.createElement('div');
  area.style.cssText = 'display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start';

  function makeSeqDiagram(label) {
    const sdDiv = document.createElement('div');
    sdDiv.style.cssText = 'min-width:320px;flex:1;font-family:Arial';
    sdDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333">Sequence Diagram — ${p.title}</div>`;
    const sdInner = document.createElement('div');
    sdInner.style.cssText = 'border:1.5px dashed #bbb;padding:14px;background:#fafafa;overflow-x:auto';
    // Actor boxes
    const colW = Math.max(100, Math.floor(680 / p.actors.length));
    const seqTable = document.createElement('div');
    seqTable.style.cssText = `display:flex;gap:0;font-family:Arial;font-size:11px;min-width:${p.actors.length*colW}px`;
    p.actors.forEach(a => {
      const col = document.createElement('div');
      col.style.cssText = `width:${colW}px;display:flex;flex-direction:column;align-items:center`;
      const box = document.createElement('div');
      box.style.cssText = 'border:1.5px solid #555;padding:4px 8px;background:#e8f0fb;font-weight:bold;font-size:11px;text-align:center;min-width:80px;max-width:110px';
      box.textContent = a;
      col.appendChild(box);
      // Lifeline
      const ll = document.createElement('div');
      ll.style.cssText = 'width:1px;background:repeating-linear-gradient(to bottom,#555 0,#555 5px,transparent 5px,transparent 10px);flex:1;min-height:200px;margin-top:0';
      col.appendChild(ll);
      seqTable.appendChild(col);
    });
    sdInner.appendChild(seqTable);
    // Messages overlay
    const msgArea = document.createElement('div');
    msgArea.style.cssText = 'position:relative;margin-top:-200px;height:200px;pointer-events:none';
    p.messages.forEach((msg, i) => {
      const y = 20 + i * 28;
      const fromX = (msg.from + 0.5) * colW;
      const toX = (msg.to + 0.5) * colW;
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText = `position:absolute;top:${y}px;left:${Math.min(fromX,toX)}px;width:${Math.abs(toX-fromX)}px;height:20px;display:flex;align-items:center`;
      const line = document.createElement('div');
      line.style.cssText = `height:1.5px;background:#555;flex:1`;
      msgDiv.appendChild(line);
      const arrow = document.createElement('div');
      arrow.style.cssText = `font-size:10px;color:#555;${toX>fromX?'':'transform:scaleX(-1)'}`;
      arrow.textContent = '▶';
      if(toX>fromX) msgDiv.appendChild(arrow); else msgDiv.insertBefore(arrow,line);
      const label2 = document.createElement('div');
      label2.style.cssText = `position:absolute;top:-12px;left:${Math.abs(toX-fromX)*0.2}px;font-size:9.5px;color:#333;white-space:nowrap;background:#fafafa;padding:0 2px`;
      label2.textContent = msg.msg;
      msgDiv.appendChild(label2);
      msgArea.appendChild(msgDiv);
    });
    sdInner.appendChild(msgArea);
    sdDiv.appendChild(sdInner);
    sdDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px">Diagram ${label}</div>`;
    return sdDiv;
  }

  area.appendChild(makeSeqDiagram('1 — Sequence Diagram'));

  // Collaboration diagram
  const collDiv = document.createElement('div');
  collDiv.style.cssText = 'min-width:280px;flex:1;font-family:Arial';
  collDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333">Collaboration Diagram — ${p.title}</div>`;
  const collInner = document.createElement('div');
  collInner.style.cssText = 'border:1.5px dashed #bbb;padding:14px;background:#fafafa;font-family:Arial;font-size:11px;min-height:200px';
  const collBoxes = document.createElement('div');
  collBoxes.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;padding:10px';
  p.actors.slice(0, Math.min(4, p.actors.length)).forEach((a, i) => {
    const b = document.createElement('div');
    b.style.cssText = 'border:1.5px solid #555;padding:4px 10px;background:#e8f0fb;font-size:11px;font-weight:bold;text-align:center';
    b.textContent = a;
    collBoxes.appendChild(b);
    if(i < Math.min(3, p.actors.length-1)) {
      const arr = document.createElement('div');
      arr.style.cssText = 'font-size:14px;color:#4a90d9';
      arr.textContent = '→';
      collBoxes.appendChild(arr);
    }
  });
  collInner.appendChild(collBoxes);
  collDiv.appendChild(collInner);
  collDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px">Diagram 2 — Collaboration Diagram</div>`;
  area.appendChild(collDiv);
  canvas.appendChild(area);
}

function renderStateActivity(p, canvas) {
  canvas.innerHTML = `<div class="diagram-title">Statechart & Activity — ${p.title}</div>`;
  const area = document.createElement('div');
  area.style.cssText = 'display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start';

  // Statechart
  const stDiv = document.createElement('div');
  stDiv.style.cssText = 'min-width:300px;flex:1;font-family:Arial';
  stDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333">Statechart — ${p.title}</div>`;
  const stInner = document.createElement('div');
  stInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;min-height:120px';
  // Initial state dot
  const initRow = document.createElement('div');
  initRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center';
  initRow.innerHTML = `<div style="width:14px;height:14px;background:#333;border-radius:50%;flex-shrink:0"></div>`;
  p.states.forEach((s, i) => {
    initRow.innerHTML += `<div style="font-size:11px;color:#333">→</div>`;
    const st = document.createElement('div');
    st.style.cssText = 'border:1.5px solid #555;padding:4px 10px;border-radius:18px;background:#fff;font-size:11px;font-family:Arial;white-space:nowrap';
    st.textContent = s;
    initRow.appendChild(st);
    if(p.transitions && p.transitions[i]) {
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:9px;color:#4a90d9;margin-top:-8px;text-align:center;width:100%';
    }
  });
  initRow.innerHTML += `<div style="width:14px;height:14px;background:#333;border-radius:50%;border:3px solid #333;background:#fff;flex-shrink:0"></div>`;
  stInner.appendChild(initRow);
  // Transitions
  if(p.transitions) {
    const trel = document.createElement('div');
    trel.className = 'rel-section';
    trel.style.marginTop = '12px';
    p.transitions.forEach(t => {
      trel.innerHTML += `<div style="font-size:10px">● ${t.from} → <span style="color:#4a90d9">${t.label}</span> → ${t.to}</div>`;
    });
    stInner.appendChild(trel);
  }
  stDiv.appendChild(stInner);
  stDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px">Diagram 1 — Statechart Diagram</div>`;
  area.appendChild(stDiv);

  // Activity Diagram
  const actDiv = document.createElement('div');
  actDiv.style.cssText = 'min-width:220px;flex:1;font-family:Arial';
  actDiv.innerHTML = `<div style="font-weight:bold;margin-bottom:10px;font-size:12px;color:#333">Activity Diagram — ${p.title}</div>`;
  const actInner = document.createElement('div');
  actInner.style.cssText = 'border:1.5px dashed #bbb;padding:16px;background:#fafafa;display:flex;flex-direction:column;align-items:center;gap:0;min-height:120px';
  actInner.innerHTML = `<div style="width:14px;height:14px;background:#333;border-radius:50%;margin-bottom:4px"></div>`;
  p.activities.forEach((a, i) => {
    actInner.innerHTML += `
      <div style="width:2px;height:10px;background:#555"></div>
      <div style="border:1.5px solid #555;padding:4px 18px;background:#fff3cd;font-size:11px;border-radius:3px;text-align:center;min-width:140px;white-space:nowrap">${a}</div>
    `;
  });
  actInner.innerHTML += `<div style="width:2px;height:10px;background:#555"></div><div style="width:14px;height:14px;border-radius:50%;border:3px solid #333;background:#333;box-shadow:0 0 0 3px #fff,0 0 0 5px #333"></div>`;
  actDiv.appendChild(actInner);
  actDiv.innerHTML += `<div style="text-align:center;font-size:10px;color:#888;margin-top:4px">Diagram 2 — Activity Diagram</div>`;
  area.appendChild(actDiv);
  canvas.appendChild(area);
}

function render() {
  const p = problems[currentIdx];
  const canvas = document.getElementById('mainCanvas');
  canvas.innerHTML = '';
  if(p.type === 'dfd-usecase') renderDFDUseCase(p, canvas);
  else if(p.type === 'class-object') renderClassObject(p, canvas);
  else if(p.type === 'sequence') renderSequence(p, canvas);
  else if(p.type === 'state-activity') renderStateActivity(p, canvas);
  document.getElementById('diagCounter').textContent = `Problem ${p.id} of 78 — ${p.section}`;
  document.getElementById('statusProblem').textContent = `Problem ${p.id}: ${p.title}`;
}

buildSidebar(filteredProblems);
render();
</script>
</body>
</html>
